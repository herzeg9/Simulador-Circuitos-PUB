<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório PUB 2025 - Versão Master</title>
    
    <script>MathJax = {loader: {load: ['input/asciimath', 'output/chtml']}, asciimath: {delimiters: [['`','`']]}};</script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/startup.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Dark Mode Toggle -->
    <div class="dark-mode-toggle">
        <label class="switch">
            <input type="checkbox" id="darkModeSwitch" onchange="toggleDarkMode()">
            <span class="slider"></span>
        </label>
        <span class="toggle-label"> Dark Mode</span>
    </div>

    <h1> Laboratório Virtual de Circuitos</h1>
    <p class="subtitle">Análise Nodal, Malhas e Fontes Controladas</p>

    <div class="main-layout">
        <div class="input-panel">
            <div class="panel-top-bar">
                <div class="modo-sim-toggle-wrap" title="Modo de simulação">
                    <span class="modo-sim-text modo-sim-text--dc">DC</span>
                    <label class="switch switch-modo-sim">
                        <input type="checkbox" id="toggleModoAc" aria-label="Alternar entre modo DC e AC">
                        <span class="slider slider-modo-sim"></span>
                    </label>
                    <span class="modo-sim-text modo-sim-text--ac">AC</span>
                </div>
            </div>

            <div id="painelConfigAc" class="sim-config-ac" hidden>
                <div class="sim-config-ac__title">Configurações de Simulação</div>
                <label class="sim-config-ac__label" for="inputFrequenciaAc">Frequência (Hz)</label>
                <input type="number" class="sim-config-ac__input" id="inputFrequenciaAc" min="0" step="any" value="60" placeholder="60">
            </div>
            
            <label style="font-weight:bold; color:#3498db;">📚 Biblioteca:</label>
            <select class="example-select" onchange="carregarExemplo(this.value)">
                <option value="">-- Carregar Exemplo --</option>
                <option value="divisor">1. Divisor de Tensão</option>
                <option value="ponte">2. Ponte de Wheatstone</option>
                <option value="amp">3. Amplificador (VCVS)</option>
                <option value="misto">4. Malhas Complexas</option>
                <option value="capacitor_dc">5. Capacitor em DC (Bloqueio)</option>
                <option value="indutor_dc">6. Indutor em DC (Curto)</option>
                <option value="vccs_amp">7. Transcondutância (VCCS)</option>
                <option value="ccvs_teste">8. Transresistência (CCVS)</option>
                <option value="cccs_bjt">9. Modelo Transistor (CCCS)</option>
            </select>

            <div class="control-group">
                <button class="btn-add" style="background:#f1c40f; color:#333;" onclick="add('Resistor')">+ R</button>
                <button class="btn-add" style="background:#e74c3c" onclick="add('VoltageSource')">+ V</button>
                <button class="btn-add" style="background:#2ecc71" onclick="add('CurrentSource')">+ I</button>
                <div class="control-group-dep">
                    <select id="selectTipoDependente" class="dep-select" aria-label="Tipo de fonte dependente">
                        <option value="VCVS">VCVS (E)</option>
                        <option value="VCCS">VCCS (G)</option>
                        <option value="CCVS">CCVS (H)</option>
                        <option value="CCCS">CCCS (F)</option>
                    </select>
                    <button type="button" class="btn-add btn-add-dep" onclick="add(document.getElementById('selectTipoDependente').value)" aria-label="Adicionar fonte dependente">+</button>
                </div>
                <button class="btn-add" style="background:#ff6b35" onclick="add('Capacitor')">+ C</button>
                <button class="btn-add" style="background:#4a5568" onclick="add('Inductor')">+ L</button>
            </div>

            <ul id="listaComponentes"></ul>

            <div class="button-group">
                <button class="btn-calc" onclick="calcular()"> Analisar Completo</button>
                <button class="btn-clear" onclick="limparTudo()"> Limpar Tudo</button>
            </div>
            <div id="loading" class="loading">Processando na Wolfram Cloud...</div>
        </div>

        <div class="output-panel" id="resultado">
            <div class="card" style="text-align:center; color:#999; padding: 60px;">
                <p><strong>Bem-vindo!</strong></p>
                <p>Adicione componentes ou escolha um exemplo.</p>
                <p style="font-size:0.8em">Agora com suporte a Fontes Dependentes e Malhas.</p>
            </div>
        </div>
    </div>

    <script src="script.js?v=20260423"></script>
</body>
</html>
