name: Test esquemático

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Atualizar PNGs de referência (regressão visual)'
        type: boolean
        default: false

jobs:
  audit:
    name: Auditoria layout SVG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Auditoria estrutural
        run: node tests/esquematico-audit.mjs

      - name: Snapshots SVG
        run: node tests/svg-snapshot.mjs

      - name: Instalar dependências (regressão PNG)
        run: npm install --no-audit --no-fund

      - name: Regressão visual (screenshots PNG)
        run: npm run test:visual
        env:
          CI: 'true'
          UPDATE_SNAPSHOTS: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots && '1' || '' }}
